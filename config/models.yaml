# Definicje modeli do testowania. Pipeline może uruchamiać eval na różnych modelach
# i porównywać wyniki. Pełne wykorzystanie w KROKACH 4 i 6.

# Model używany domyślnie, jeśli nie podano innego.
default: gpt-4o-mini

models:
  - name: gpt-4o-mini
    provider: openai
    # Cennik w USD za 1 mln tokenów (stan: połowa 2026 — zweryfikuj przy aktualizacji).
    # Trzymamy ceny w configu, bo zmieniają się niezależnie od kodu (Krok 5: liczenie kosztów).
    price_per_1m_input_tokens: 0.15
    price_per_1m_output_tokens: 0.60
    max_output_tokens: 1024
    temperature: 0.0  # determinizm = powtarzalność evalu (reproducibility)