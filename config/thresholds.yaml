# SLA thresholds for the CI gate. The full comparison logic is built in STEP 7.
# If any threshold is violated, the pipeline in CI exits with code 1 and blocks the merge.
# The values below are a reasonable starting point — we will refine them together with
# the metrics implementation.

# Maximum allowed hallucination rate (0.05 = 5%). Required by the project assumptions.
max_hallucination_rate: 0.05

# Minimum answer relevancy, scale 0..1.
min_answer_relevancy: 0.80

# Minimum faithfulness to sources, scale 0..1.
min_faithfulness: 0.85

# Latency limits in seconds (percentiles computed over the whole run).
max_latency_p50_seconds: 2.0
max_latency_p95_seconds: 5.0

# Maximum average cost of a single query in USD.
max_cost_per_query_usd: 0.01