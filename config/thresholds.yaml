# Progi SLA dla bramki CI (gate). Pełna logika porównania powstanie w KROKU 7.
# Jeśli którykolwiek próg zostanie naruszony, pipeline w CI kończy się kodem 1
# i blokuje merge. Wartości poniżej to rozsądny punkt startowy — doprecyzujemy je
# wraz z implementacją metryk.

# Maksymalny dopuszczalny odsetek halucynacji (0.05 = 5%). Wymóg z założeń projektu.
max_hallucination_rate: 0.05

# Minimalna trafność odpowiedzi (answer relevancy), skala 0..1.
min_answer_relevancy: 0.80

# Minimalna wierność źródłom (faithfulness), skala 0..1.
min_faithfulness: 0.85

# Limity latencji w sekundach (percentyle liczone z całego runu).
max_latency_p50_seconds: 2.0
max_latency_p95_seconds: 5.0

# Maksymalny średni koszt pojedynczego zapytania w USD.
max_cost_per_query_usd: 0.01