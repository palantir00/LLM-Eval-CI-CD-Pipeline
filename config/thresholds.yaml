# SLA thresholds for the CI gate (src/eval/gate.py).
# If any threshold is violated, the gate exits with code 1 and blocks the merge.
#
# CALIBRATION NOTE: a threshold must match the SCALE of its metric, otherwise the gate raises
# false alarms on a perfectly healthy pipeline. answer_relevancy and faithfulness are cosine
# similarities of sentence embeddings, where realistic "good" values sit around 0.4-0.7 (a short
# question rarely scores >0.8 against a longer answer). So we set their minimums accordingly,
# calibrated against the offline mock baseline (relevancy ~0.66, faithfulness ~0.99) with margin.

# Maximum allowed hallucination rate (0.05 = 5%). Required by the project assumptions.
max_hallucination_rate: 0.05

# Minimum answer relevancy, scale 0..1 (embedding cosine similarity question<->answer).
min_answer_relevancy: 0.50

# Minimum faithfulness to sources, scale 0..1 (embedding cosine similarity answer<->context).
min_faithfulness: 0.80

# Latency limits in seconds (percentiles over the whole run).
max_latency_p50_seconds: 2.0
max_latency_p95_seconds: 5.0

# Maximum average cost of a single query in USD.
max_cost_per_query_usd: 0.01